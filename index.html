<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Detector</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <header>
            <h1>AI-Generated Image Detector</h1>
            <p>Upload an image to check if it's real or AI-generated.</p>
            <p class="model-info">Using <strong>Organika/AI-image-detector</strong></p>
        </header>

        <main>
            <div id="image-uploader">
                <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
                <label for="image-upload-input" class="upload-label">
                    <img id="image-preview" src="#" alt="Image preview">
                    <span id="upload-placeholder">Click to upload an image</span>
                </label>
            </div>

            <button id="detect-button" disabled>Detect</button>

            <div id="status-container">
                <p id="status-message">Please upload an image to begin.</p>
                <div id="progress-bar-container" style="display: none;">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div id="results-container"></div>
        </main>

        <footer>
            <p>Powered by <a href="https://huggingface.co/docs/transformers.js/index" target="_blank" rel="noopener noreferrer">Transformers.js</a> & ONNX Runtime</p>
        </footer>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1"
      }
    }
    </script>
    <script type="module" src="main.js"></script>

</body>
</html>
